stage_1:
  target: stage1.RAE
  params:
    encoder_cls: 'SigLIP2wNormTTREG'
    encoder_config_path: 'google/siglip2-base-patch16-256'
    encoder_input_size: 256
    encoder_params: 
      model_name: 'google/siglip2-base-patch16-256'
      config_path: 'src/stage1/encoders/siglip2_tt_reg/configs/siglip2_base_with_max.yaml'
    decoder_config_path: 'configs/decoder/ViTXL'
    pretrained_decoder_path: 'models/decoders/siglip2/base_p16_i256/ViTXL_n08/model.pt'
    noise_tau: 0.
    reshape_to_2d: True
    normalization_stat_path: models/stats/siglipv2_tt_reg_with_max/RAE-pretrained-bs256-fp32/normalization_stats.pt

stage_2:
  target: stage2.models.lightningDiT.LightningDiT
  params:
    input_size: 16
    patch_size: 1
    in_channels: 768
    hidden_size: 1152
    depth: 28
    num_heads: 16
    mlp_ratio: 4.0
    class_dropout_prob: 0.1
    num_classes: 1000
    use_qknorm: false
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    register_conditioning: true
    register_len: 36
    register_start: 8
  ckpt: results/stage2/DiT-XL_SigLIP2-B_tt_reg_data_lognormal-in_context_36/800_Epochs_train-stage2_DiT-XL_SigLIP2-B_tt_reg_data_lognormal-in_context_36/checkpoints


transport:
  params:
    path_type: 'Linear'
    prediction: 'data'
    loss_weight: null
    time_dist_type: 'logit-normal_0_1' # this can be 'uniform' or 'logit-normal_0_1'

sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false

guidance:
  method: 'cfg'
  scale: 1.0
  t_min: 0.0
  t_max: 1.0

misc:
  latent_size: [768, 16, 16] # [C, H, W]
  num_classes: 1000
  time_dist_shift_dim: 196608 # 16*16*768
  time_dist_shift_base: 4096

training:
  global_seed: 0
  epochs: 801
  global_batch_size: 1024 # 1024
  grad_accum_steps: 1 # change according to your GPU memory
  ema_decay: 0.9999
  num_workers: 4
  log_every: 100
  ckpt_every: 5000
  sample_every: 10000
  clip_grad: -1.0
  optimizer:
    base_lr: 0.0002
    beta: [0.9, 0.95]
    wd: 0.0
  scheduler:
    schedule_type: 'linear'
    decay_start_epoch: 0
    decay_end_epoch: 800
    final_lr: 0.0002