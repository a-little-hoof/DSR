stage_1:
  target: stage1.RAE
  params:
    encoder_cls: 'SigLIP2wNorm'
    encoder_config_path: 'google/siglip2-so400m-patch14-224'
    encoder_input_size: 224
    encoder_params: {'model_name': 'google/siglip2-so400m-patch14-224'}
    decoder_config_path: 'configs/decoder/ViTXL'
    # pretrained_decoder_path: 'models/decoders/siglip2/base_p16_i256/ViTXL_n08/model.pt'
    noise_tau: 0.8
    reshape_to_2d: True
    # normalization_stat_path: 'models/stats/siglip2/base_p16_i256/ImageNet1k/stat.pt'


training:
  epochs: 16
  ema_decay: 0.9978
  global_batch_size: 512
  num_workers: 8
  clip_grad: 0.0
  log_interval: 100
  checkpoint_interval: 1 # every 1 epoch
  sample_every: 2500
  optimizer:
    lr: 2.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: cosine
    warmup_epochs: 1
    decay_end_epoch: 16
    base_lr: 2.0e-4
    final_lr: 2.0e-5
    warmup_from_zero: true

# Uncomment to enable online reconstruction evaluation; point these at your
# ImageNet validation set and the corresponding ADM reference statistics.
# eval:
#   eval_interval: 10000
#   eval_model: true
#   data_path: 'data/ILSVRC/Data/CLS-LOC/val'
#   reference_npz_path: 'data/ILSVRC/Data/CLS-LOC/val.npz'
#   metrics: ['psnr', 'ssim', 'rfid']

gan:
  disc:
    arch:
      dino_ckpt_path: 'models/discs/dino_vit_small_patch8_224.pth'
      ks: 9
      norm_type: 'bn'
      using_spec_norm: true
      recipe: 'S_8'
    optimizer:
      lr: 2.0e-4
      betas: [0.9, 0.95]
      weight_decay: 0.0
    scheduler:
      type: cosine
      warmup_epochs: 1
      decay_end_epoch: 16
      base_lr: 2.0e-4
      final_lr: 2.0e-5
      warmup_from_zero: true
    augment:
      prob: 1.0
      cutout: 0.0
  loss:
    disc_loss: hinge
    gen_loss: vanilla
    disc_weight: 0.75
    perceptual_weight: 1.0
    disc_start: 8
    disc_upd_start: 6
    lpips_start: 0
    max_d_weight: 10000.0
    disc_updates: 1
    